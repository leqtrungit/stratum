# =============================================================================
# Stratum — Storage Overlay (RustFS S3)
# Template file. Merged into docker-compose.yml by ./install.sh when
# the user selects storage during setup.
# =============================================================================

volumes:
  rustfs_data:

services:
  # ---------------------------------------------------------------------------
  # RustFS — Lightweight Self-Hosted S3-Compatible Object Storage
  # Internal only: NestJS calls it via presigned URLs; clients upload directly
  # to presigned URLs, never to RustFS's raw API.
  # S3 API: port 9000 | Web Console: port 9001
  # ---------------------------------------------------------------------------
  rustfs:
    image: rustfs/rustfs:latest
    container_name: ${PROJECT_NAME:-stratum}_rustfs
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000"   # S3 API — internal, not publicly reachable in production
      - "9001:9001"   # Web Console — dev mode only
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    volumes:
      - rustfs_data:/data
    networks:
      - stratum
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
