version: "3.9"

# =============================================================================
# Stratum — Core Stack
# Template file. Do NOT use directly.
# Run ./install.sh to generate docker-compose.yml
# =============================================================================

networks:
  stratum:
    name: ${PROJECT_NAME:-stratum}_network
    driver: bridge

volumes:
  postgres_data:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Datastore
  # Internal only: accessible within Docker network by Hasura
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-stratum}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stratum}
      POSTGRES_USER: ${POSTGRES_USER:-stratum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stratum
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stratum} -d ${POSTGRES_DB:-stratum}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Hasura GraphQL Engine v2 — Public GraphQL API
  # The sole public-facing interface. All client traffic enters here.
  # ---------------------------------------------------------------------------
  hasura:
    image: hasura/graphql-engine:v2.44.0
    container_name: ${PROJECT_NAME:-stratum}_hasura
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: ${HASURA_GRAPHQL_DATABASE_URL:?HASURA_GRAPHQL_DATABASE_URL is required}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:?HASURA_GRAPHQL_ADMIN_SECRET is required}
      HASURA_GRAPHQL_JWT_SECRET: ${HASURA_GRAPHQL_JWT_SECRET}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-true}
      HASURA_GRAPHQL_DEV_MODE: ${HASURA_GRAPHQL_DEV_MODE:-true}
      HASURA_GRAPHQL_LOG_LEVEL: ${HASURA_GRAPHQL_LOG_LEVEL:-info}
      # NestJS webhook endpoint — Hasura calls this for Actions & Event Triggers
      NESTJS_WEBHOOK_URL: http://nestjs:3000
    networks:
      - stratum
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # NestJS — Internal Business Logic Layer
  # Never exposed publicly. Only called by Hasura via Actions / Event Triggers.
  # ---------------------------------------------------------------------------
  nestjs:
    build:
      context: ./nestjs
      dockerfile: Dockerfile
      target: production
    container_name: ${PROJECT_NAME:-stratum}_nestjs
    restart: unless-stopped
    depends_on:
      hasura:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HASURA_ENDPOINT: ${HASURA_ENDPOINT:-http://hasura:8080}
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:?HASURA_ADMIN_SECRET is required}
      HASURA_EVENT_SECRET: ${HASURA_EVENT_SECRET:?HASURA_EVENT_SECRET is required}
      STORAGE_ENABLED: ${STORAGE_ENABLED:-false}
      GARAGE_ENDPOINT: ${GARAGE_ENDPOINT:-}
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_DEFAULT_BUCKET:-uploads}
      GARAGE_REGION: ${GARAGE_REGION:-garage}
    networks:
      - stratum
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
